<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butler Modern UI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Xterm.js for terminal -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.min.js"></script>
</head>
<body>
    <div class="background-animation"></div>
    <div class="glass-container">
        <header>
            <div class="window-controls">
                <span class="control-dot close"></span>
                <span class="control-dot minimize"></span>
                <span class="control-dot maximize"></span>
            </div>
            <div class="logo">
                <i class="fas fa-robot"></i>
                <span>BUTLER</span>
            </div>
            <div class="status-indicators">
                <span id="voice-status" class="status-dot"></span>
                <span id="connection-status" class="status-dot connected"></span>
            </div>
        </header>

        <main id="interaction-flow">
            <!-- Content will be dynamically added here -->
            <div class="welcome-message">
                <h1>欢迎使用 Butler</h1>
                <p>直接开始输入您的指令...</p>
            </div>
        </main>

        <footer>
            <div id="status-bar">就绪</div>
        </footer>

        <!-- Apple Style Dock -->
        <div class="dock-container">
            <div class="dock">
                <div class="dock-item" id="dock-home" title="首页"><i class="fas fa-home"></i></div>
                <div class="dock-item" id="dock-terminal" title="终端"><i class="fas fa-terminal"></i></div>
                <div class="dock-item" id="dock-voice" title="语音控制"><i class="fas fa-microphone"></i></div>
                <div class="dock-item" id="dock-pause" title="暂停"><i class="fas fa-pause"></i></div>
                <div class="dock-item" id="dock-retry" title="重试"><i class="fas fa-redo"></i></div>
                <div class="dock-item" id="dock-editor" title="编辑器"><i class="fas fa-file-alt"></i></div>
                <div class="dock-separator"></div>
                <div class="dock-item" id="dock-settings" title="设置"><i class="fas fa-cog"></i></div>
            </div>
        </div>
    </div>

    <div id="editor-overlay">
        <div class="editor-header">
            <span id="editor-filename">未命名文档</span>
            <div style="display: flex; gap: 10px;">
                <button class="secondary-btn" id="open-in-office">在 Office 中打开</button>
                <button class="action-btn" id="save-editor">保存</button>
                <button class="secondary-btn" id="close-editor"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="editor-toolbar">
            <div class="toolbar-btn" title="粗体"><i class="fas fa-bold"></i></div>
            <div class="toolbar-btn" title="斜体"><i class="fas fa-italic"></i></div>
            <div class="toolbar-btn" title="插入图片"><i class="fas fa-image"></i></div>
            <div class="toolbar-btn" title="插入表格"><i class="fas fa-table"></i></div>
        </div>
        <textarea id="markdown-editor" placeholder="在此开始撰写您的文档..."></textarea>
    </div>

    <div id="terminal-overlay" class="hidden">
        <div class="terminal-window">
            <div class="terminal-header">
                <span>独立终端</span>
                <button id="close-terminal"><i class="fas fa-times"></i></button>
            </div>
            <div id="terminal-container"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
