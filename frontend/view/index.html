<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butler AI - Apple Style</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Xterm.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.min.js"></script>
</head>
<body class="theme-apple">
    <div class="app-container">
        <!-- Permanent Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="window-controls">
                    <span class="control-dot close"></span>
                    <span class="control-dot minimize"></span>
                    <span class="control-dot maximize"></span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-item active" id="nav-chat" title="智能助手">
                    <i class="fas fa-comment-dots"></i>
                    <span>对话</span>
                </div>
                <div class="nav-item" id="nav-terminal" title="终端">
                    <i class="fas fa-terminal"></i>
                    <span>终端</span>
                </div>
                <div class="nav-item" id="nav-workspace" title="文档工作区">
                    <i class="fas fa-briefcase"></i>
                    <span>工作区</span>
                </div>
                <div class="nav-item" id="nav-media" title="多媒体中心">
                    <i class="fas fa-play-circle"></i>
                    <span>媒体</span>
                </div>
                <div class="nav-item" id="nav-files" title="文件管理">
                    <i class="fas fa-folder-open"></i>
                    <span>文件</span>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="nav-item" id="nav-settings" title="系统设置">
                    <i class="fas fa-cog"></i>
                    <span>设置</span>
                </div>
                <div class="user-avatar">
                    <img src="https://ui-avatars.com/api/?name=Butler&background=0D8ABC&color=fff" alt="User">
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="content-header">
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div class="icon-btn-small" id="sidebar-toggle" title="侧边栏控制">
                        <i class="fas fa-sidebar"></i>
                    </div>
                    <div class="view-title" id="current-view-title">智能助手</div>
                </div>

                <div class="status-indicators">
                    <div class="status-indicator-item" title="更换背景">
                        <div class="icon-btn-small" id="bg-upload-btn"><i class="fas fa-image"></i></div>
                        <input type="file" id="bg-upload" accept="image/*" style="display: none;">
                    </div>
                    <div class="status-indicator-item" title="系统连接">
                        <span id="connection-status" class="status-dot green active"></span>
                    </div>
                    <div class="status-indicator-item" title="正在思考">
                        <span id="thinking-status" class="status-dot blue"></span>
                    </div>
                    <div class="status-indicator-item" title="语音状态">
                        <span id="voice-status" class="status-dot red"></span>
                    </div>
                </div>
            </header>

            <!-- View Containers -->
            <section id="view-chat" class="view-container active">
                <div id="interaction-flow">
                    <div class="welcome-message">
                        <h1>你好，Butler</h1>
                        <p>今天有什么可以帮你的吗？</p>
                    </div>
                </div>
                <!-- Chat Input Area -->
                <div class="chat-input-container">
                    <div class="input-actions-left">
                        <button class="icon-btn-small" title="语音" id="voice-toggle-btn"><i class="fas fa-microphone"></i></button>
                        <button class="icon-btn-small" title="附件"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="input-wrapper">
                        <div id="chat-input" contenteditable="true" placeholder="发送消息或输入终端命令..."></div>
                    </div>
                    <div class="input-actions-right">
                        <button class="send-btn" id="send-command-btn"><i class="fas fa-arrow-up"></i></button>
                    </div>
                </div>
            </section>

            <section id="view-terminal" class="view-container">
                <div class="terminal-wrapper">
                    <div id="terminal-container"></div>
                </div>
            </section>

            <section id="view-workspace" class="view-container">
                <div class="workspace-placeholder">
                    <i class="fas fa-file-invoice"></i>
                    <h2>全屏文档预览区</h2>
                    <p>在文件管理器中选择一个文档进行预览</p>
                </div>
                <div id="document-viewer" class="hidden">
                    <div class="viewer-header">
                        <span id="viewer-filename">filename.pdf</span>
                        <div class="viewer-actions">
                            <button id="viewer-translate"><i class="fas fa-language"></i> 翻译</button>
                            <button id="viewer-close"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <div id="viewer-content"></div>
                </div>
            </section>

            <section id="view-media" class="view-container">
                <div class="media-view-layout">
                    <div class="media-sidebar-list">
                        <div class="media-list-header">
                            <h3>媒体库</h3>
                            <div class="media-filter">
                                <button id="media-filter-audio" class="filter-btn active">音频</button>
                                <button id="media-filter-image" class="filter-btn">图片</button>
                            </div>
                        </div>
                        <div id="media-list" class="media-list-container">
                            <!-- Items: MP3, WAV, JPG -->
                        </div>
                    </div>
                    <div class="media-main-player">
                        <div id="audio-player-card" class="media-card player-active">
                            <div class="media-visual-area">
                                <div class="audio-disc-animation">
                                    <i class="fas fa-music"></i>
                                </div>
                            </div>
                            <div class="media-info-area">
                                <h2 id="media-title-display">未播放曲目</h2>
                                <p id="media-subtitle-display">支持 MP3 & WAV 格式</p>
                                <audio id="main-audio-player" controls style="width: 100%; margin-top: 20px;"></audio>
                                <div class="media-extra-controls">
                                    <button id="shuffle-media-btn" class="icon-btn-small" title="随机播放"><i class="fas fa-random"></i> 随机播放</button>
                                </div>
                            </div>
                        </div>

                        <div id="image-viewer-card" class="media-card hidden">
                            <div class="image-preview-box">
                                <img id="main-image-viewer" src="" alt="Preview">
                            </div>
                        </div>

                        <div class="media-format-desc-card">
                            <div class="desc-header">
                                <i class="fas fa-history"></i> <span>格式由来与背景</span>
                            </div>
                            <div id="format-info-content" class="desc-body">
                                选择左侧媒体文件以查看其格式由来...
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="view-files" class="view-container">
                <div class="files-explorer-view">
                    <div class="files-sidebar-inner">
                        <div class="storage-group">
                            <div class="storage-item active" data-path="."><i class="fas fa-hdd"></i> 本地存储</div>
                            <div class="storage-item" data-path="CORE_LOGIC"><i class="fas fa-microchip"></i> 核心系统</div>
                        </div>
                    </div>
                    <div class="files-main-inner">
                        <div class="files-toolbar">
                            <div class="breadcrumb" id="files-breadcrumb">Butler / Root</div>
                            <div class="files-actions-top">
                                <button class="icon-btn-small"><i class="fas fa-sync"></i></button>
                            </div>
                        </div>
                        <div class="files-grid" id="files-list">
                            <!-- Files populated by JS -->
                        </div>
                    </div>
                </div>
            </section>

            <section id="view-settings" class="view-container">
                <div class="settings-view">
                    <h2>系统设置</h2>
                    <div class="settings-group">
                        <h3>外观</h3>
                        <div class="setting-item">
                            <span>深色模式</span>
                            <label class="switch">
                                <input type="checkbox" checked>
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div class="setting-item">
                            <span>界面主题</span>
                            <select id="theme-selector">
                                <option value="apple">Apple (Classic)</option>
                                <option value="modern">Modern Glass</option>
                            </select>
                        </div>
                    </div>
                    <div class="settings-group">
                        <h3>配额</h3>
                        <div id="quota-display">
                            <!-- Quota info here -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Media Gallery Overlay -->
    <div id="media-overlay" class="hidden">
        <div class="media-gallery-container">
            <div class="media-gallery-header">
                <span id="media-title">图片查看器</span>
                <button id="close-media" class="close-btn"><i class="fas fa-times"></i></button>
            </div>
            <div id="media-content"></div>
            <div class="media-gallery-footer">
                <button id="media-prev"><i class="fas fa-chevron-left"></i></button>
                <button id="media-play-pause"><i class="fas fa-play"></i></button>
                <button id="media-next"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
