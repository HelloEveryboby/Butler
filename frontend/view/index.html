<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butler AI - Next Gen Matrix</title>
    <link rel="stylesheet" href="style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Xterm.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.min.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body class="theme-apple matrix-mode">
    <div id="dynamic-island">Butler</div>

    <!-- Global Music Widget (Dynamic Island Style) -->
    <div id="music-widget" class="music-widget-visible glass-surface damping-transition">
        <div class="music-widget-compact">
            <div class="disc-container">
                <div class="mini-disc" id="widget-disc">
                    <i class="fas fa-music"></i>
                </div>
            </div>
            <div class="music-info-capsule damping-transition">
                <div class="track-scroller">
                    <span id="widget-track-name">未在播放</span>
                </div>
                <div class="widget-controls">
                    <i class="fas fa-step-backward" id="widget-prev"></i>
                    <i class="fas fa-play" id="widget-play-pause"></i>
                    <i class="fas fa-step-forward" id="widget-next"></i>
                </div>
            </div>
            <div class="widget-menu-trigger" id="widget-list-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
        <div id="widget-playlist" class="widget-playlist-hidden damping-transition">
            <div class="playlist-header">
                <span>播放列表</span>
                <i class="fas fa-random" title="随机播放" id="widget-shuffle"></i>
            </div>
            <div id="widget-playlist-items" class="playlist-items-container"></div>
        </div>
    </div>

    <!-- Floating Dock -->
    <nav class="floating-dock glass-surface damping-transition">
        <div class="dock-item active" id="dock-0-0" onclick="matrix.moveTo(0,0)" title="智能助手与排障 (0,0)">
            <i class="fas fa-comment-dots"></i>
            <span class="dock-dot"></span>
        </div>
        <div class="dock-item" id="dock-1-0" onclick="matrix.moveTo(1,0)" title="DAG 任务流水线 (1,0)">
            <i class="fas fa-project-diagram"></i>
            <span class="dock-dot"></span>
        </div>
        <div class="dock-item" id="dock-0-1" onclick="matrix.moveTo(0,1)" title="时光机可观测性 (0,1)">
            <i class="fas fa-history"></i>
            <span class="dock-dot"></span>
        </div>
        <div class="dock-item" id="dock-1-1" onclick="matrix.moveTo(1,1)" title="技能与文件仓 (1,1)">
            <i class="fas fa-box-open"></i>
            <span class="dock-dot"></span>
        </div>
        <div class="dock-divider"></div>
        <div class="dock-item" id="dock-settings" onclick="toggleSettings()" title="系统设置">
            <i class="fas fa-cog"></i>
        </div>
    </nav>

    <div class="app-container">
        <main class="main-content">
            <div id="workspace-matrix">
                <!-- (0,0) Quadrant: Smart Chat & Debugger -->
                <section class="matrix-cell" id="cell-0-0">
                    <div class="view-header">
                        <div class="view-title">智能助手与多模态排障</div>
                        <div class="status-indicators">
                            <span id="connection-status" class="status-dot green active"></span>
                            <span id="thinking-status" class="status-dot blue"></span>
                        </div>
                    </div>
                    <div id="interaction-flow">
                        <div class="welcome-message">
                            <h1>你好，Butler</h1>
                            <p>随时拖入报错截图，我将为你即刻修复。</p>
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <div class="input-actions-left">
                            <button class="icon-btn-small" id="voice-toggle-btn"><i class="fas fa-microphone"></i></button>
                            <button class="icon-btn-small"><i class="fas fa-plus"></i></button>
                        </div>
                        <div class="input-wrapper">
                            <div id="chat-input" contenteditable="true" placeholder="发送消息或拖入截图..."></div>
                        </div>
                        <div class="input-actions-right">
                            <button class="send-btn" id="send-command-btn"><i class="fas fa-arrow-up"></i></button>
                        </div>
                    </div>
                </section>

                <!-- (1,0) Quadrant: DAG Pipeline (Note: in matrix CSS, columns are X, rows are Y) -->
                <section class="matrix-cell" id="cell-1-0">
                    <div class="view-header">
                        <div class="view-title">DAG 任务依赖拓扑</div>
                    </div>
                    <div class="dag-canvas" id="workflow-canvas">
                        <svg id="dag-svg" style="position:absolute; width:100%; height:100%; pointer-events:none;"></svg>
                        <!-- Skills will be rendered as connectable cards here -->
                        <div class="canvas-placeholder">
                            <i class="fas fa-project-diagram"></i>
                            <h3>拖动技能卡片到此处构建流水线</h3>
                        </div>
                    </div>
                </section>

                <!-- (0,1) Quadrant: Time Machine -->
                <section class="matrix-cell" id="cell-0-1">
                    <div class="view-header">
                        <div class="view-title">全局可观测时光机</div>
                    </div>
                    <div class="timemachine-container">
                        <div class="metrics-visualizer" id="tm-metrics">
                            <!-- CPU/Mem charts -->
                        </div>
                        <div class="history-log-view" id="tm-logs">
                            <!-- Historical logs -->
                        </div>
                        <div class="tm-slider-bar glass-surface">
                            <input type="range" id="global-tm-slider" min="0" max="100" value="100">
                            <div class="tm-time-label">现在</div>
                        </div>
                    </div>
                </section>

                <!-- (1,1) Quadrant: Skills & Files -->
                <section class="matrix-cell" id="cell-1-1">
                    <div class="view-header">
                        <div class="view-title">模块化技能与文件仓</div>
                        <div class="header-actions">
                            <button class="icon-btn-small" onclick="toggleTerminal()" title="打开终端"><i class="fas fa-terminal"></i></button>
                            <button class="icon-btn-small" onclick="toggleMemos()" title="备忘录"><i class="fas fa-sticky-note"></i></button>
                        </div>
                    </div>
                    <div class="skills-files-layout">
                        <div class="skills-drawer">
                            <!-- Skill Cards -->
                        </div>
                        <div class="files-explorer-mini">
                            <div class="files-grid" id="files-list"></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Overlay Settings -->
    <div id="settings-overlay" class="hidden">
        <!-- Settings content from original index.html -->
    </div>

    <div id="notifier-root" class="notifier-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="physics.js"></script>
    <script src="matrix_controller.js"></script>
    <script src="dag_engine.js"></script>
    <script src="time_machine_ui.js"></script>
    <script src="main.js"></script>
</body>
</html>

    <!-- Overlay Terminal -->
    <div id="terminal-overlay" class="hidden glass-surface overlay-panel">
        <div class="panel-header">
            <span>终端终端会话</span>
            <button class="icon-btn-small" onclick="toggleTerminal()"><i class="fas fa-times"></i></button>
        </div>
        <div id="terminal-container"></div>
    </div>

    <!-- Overlay Memos -->
    <div id="memos-overlay" class="hidden glass-surface overlay-panel">
        <div class="panel-header">
            <span>备忘录</span>
            <button class="icon-btn-small" onclick="toggleMemos()"><i class="fas fa-times"></i></button>
        </div>
        <div id="memos-list-wrapper" class="memos-timeline"></div>
    </div>
