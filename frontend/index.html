<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butler AI - Next Gen Matrix</title>
    <link rel="stylesheet" href="src/style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Xterm.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.min.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Monaco Editor -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.36.1/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.36.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            window.monaco_ready = true;
        });
    </script>
</head>
<body class="theme-apple matrix-mode">
    <!-- Global Background Substrate Heatmap -->
    <canvas id="substrate-heatmap"></canvas>

    <div id="dynamic-island">Butler</div>

    <!-- Floating Dock -->
    <nav class="floating-dock glass-surface damping-transition">
        <div class="dock-item active" id="dock-0-0" onclick="matrix.moveTo(0,0)" title="智能助手 (0,0)">
            <i class="fas fa-comment-dots"></i>
            <span class="dock-dot"></span>
        </div>
        <div class="dock-item" id="dock-1-0" onclick="matrix.moveTo(1,0)" title="时光监控 (1,0)">
            <i class="fas fa-history"></i>
            <span class="dock-dot"></span>
        </div>
        <div class="dock-item" id="dock-0-1" onclick="matrix.moveTo(0,1)" title="任务画布 (0,1)">
            <i class="fas fa-project-diagram"></i>
            <span class="dock-dot"></span>
        </div>
        <div class="dock-item" id="dock-1-1" onclick="matrix.moveTo(1,1)" title="技能仓储 (1,1)">
            <i class="fas fa-box-open"></i>
            <span class="dock-dot"></span>
        </div>
        <div class="dock-divider"></div>
        <div class="dock-item" id="dock-settings" onclick="toggleSettings()" title="系统设置">
            <i class="fas fa-cog"></i>
        </div>
    </nav>

    <div class="app-container">
        <main class="main-content">
            <div id="workspace-matrix">
                <!-- (0,0) Quadrant: Smart Chat & Debugger -->
                <section class="matrix-cell" id="cell-0-0">
                    <div class="view-header">
                        <div class="status-indicators">
                            <span id="connection-status" class="status-dot green active"></span>
                            <span id="thinking-status" class="status-dot blue"></span>
                        </div>
                    </div>
                    <div id="interaction-flow">
                        <div class="welcome-message">
                            <h1>你好，Butler</h1>
                            <p>随时拖入报错截图，我将为你即刻修复。</p>
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <div class="input-actions-left">
                            <button class="icon-btn-small" id="voice-toggle-btn"><i class="fas fa-microphone"></i></button>
                            <button class="icon-btn-small"><i class="fas fa-plus"></i></button>
                        </div>
                        <div class="input-wrapper">
                            <div id="chat-input" contenteditable="true" placeholder="发送消息或拖入截图..."></div>
                        </div>
                        <div class="input-actions-right">
                            <button class="send-btn" id="send-command-btn"><i class="fas fa-arrow-up"></i></button>
                        </div>
                    </div>
                </section>

                <!-- (1,0) Quadrant: Time Machine -->
                <section class="matrix-cell" id="cell-1-0">
                    <div class="view-header">
                    </div>
                    <div class="timemachine-container">
                        <div class="metrics-visualizer" id="tm-metrics">
                        </div>
                        <div class="history-log-view" id="tm-logs">
                        </div>
                        <div class="tm-slider-bar glass-surface">
                            <input type="range" id="global-tm-slider" min="0" max="100" value="100">
                            <div class="tm-time-label">现在</div>
                        </div>
                    </div>
                </section>

                <!-- (0,1) Quadrant: DAG Pipeline -->
                <section class="matrix-cell" id="cell-0-1">
                    <div class="view-header">
                    </div>
                    <div class="dag-canvas" id="workflow-canvas">
                        <svg id="dag-svg" style="position:absolute; width:100%; height:100%; pointer-events:none;"></svg>
                        <div class="canvas-placeholder">
                            <i class="fas fa-project-diagram"></i>
                            <h3>拖动技能卡片到此处构建流水线</h3>
                        </div>
                    </div>
                </section>

                <!-- (1,1) Quadrant: Skills & Files -->
                <section class="matrix-cell" id="cell-1-1">
                    <div class="view-header">
                        <div class="header-actions">
                            <button class="icon-btn-small" onclick="toggleTerminal()" title="打开终端"><i class="fas fa-terminal"></i></button>
                            <button class="icon-btn-small" onclick="toggleMemos()" title="备忘录"><i class="fas fa-sticky-note"></i></button>
                        </div>
                    </div>
                    <div class="skills-files-layout">
                        <div class="skills-drawer" id="skills-drawer">
                            <!-- Skill Cards -->
                        </div>
                        <div class="files-explorer-mini">
                            <div class="files-grid" id="files-list"></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Wormhole Overlays -->
    <div id="wormhole-gate-tl" class="wormhole-gate" data-quadrant="0,0"></div>
    <div id="wormhole-gate-tr" class="wormhole-gate" data-quadrant="1,0"></div>
    <div id="wormhole-gate-bl" class="wormhole-gate" data-quadrant="0,1"></div>
    <div id="wormhole-gate-br" class="wormhole-gate" data-quadrant="1,1"></div>

    <!-- Overlay Terminal -->
    <div id="terminal-overlay" class="hidden glass-surface overlay-panel">
        <div class="panel-header">
            <span>终端会话</span>
            <button class="icon-btn-small" onclick="toggleTerminal()"><i class="fas fa-times"></i></button>
        </div>
        <div id="terminal-container"></div>
    </div>

    <!-- Overlay Memos -->
    <div id="memos-overlay" class="hidden glass-surface overlay-panel">
        <div class="panel-header">
            <span>备忘录</span>
            <button class="icon-btn-small" onclick="toggleMemos()"><i class="fas fa-times"></i></button>
        </div>
        <div id="memos-list-wrapper" class="memos-timeline"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="src/components/StateMatrix.js"></script>
    <script src="src/components/telemetry.js"></script>
    <script src="src/effects/physics.js"></script>
    <script src="src/components/matrix.js"></script>
    <script src="src/components/dag_engine.js"></script>
    <script src="src/components/time_machine_ui.js"></script>
    <script src="src/components/heatmap.js"></script>
    <script src="src/components/wormhole.js"></script>
    <script src="src/components/slits_editor.js"></script>
    <script src="src/components/vault.js"></script>
    <script src="src/components/modal.js"></script>
    <script src="src/main.js"></script>
    <script src="src/components/skill_ui_loader.js"></script>

    <!-- Copilot Confirmation Modal -->
    <div id="copilot-modal">
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-title">确认操作</div>
            </div>
            <div class="modal-body">
                <div class="modal-body-text">你确定要执行此操作吗？</div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-dismiss">解雇</button>
                <button class="modal-btn modal-btn-allow">允许</button>
            </div>
        </div>
    </div>

    <!-- Global Notification Container -->
    <div id="notifier-container" class="notifier-container"></div>
</body>
</html>
