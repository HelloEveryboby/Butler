<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Input</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .flash-container {
            width: 90%;
            max-width: 600px;
            background: rgba(30, 30, 30, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes slideIn {
            from { transform: translateY(-30px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .flash-container.bounce-exit {
            transform: translateY(-50px) scale(0.9);
            opacity: 0;
        }
        .input-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 18px;
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .input-box:focus {
            background: rgba(255, 255, 255, 0.1);
        }
        .input-box::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .flash-icon {
            color: #007aff;
            font-size: 24px;
            margin-left: 8px;
        }
        .hint {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            white-space: nowrap;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="theme-apple">
    <div class="flash-container">
        <i class="fas fa-bolt flash-icon"></i>
        <input type="text" id="main-input" class="input-box" placeholder="记录灵感、执行命令或搜索..." autofocus>
        <div class="hint">按下 <b>Enter</b> 闪击发送 | <b>Esc</b> 退出</div>
    </div>

    <script>
        const input = document.getElementById('main-input');
        const container = document.querySelector('.flash-container');

        function triggerExit(callback) {
            container.classList.add('bounce-exit');
            setTimeout(() => {
                callback();
                container.classList.remove('bounce-exit');
            }, 250);
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = input.value.trim();
                if (val) {
                    triggerExit(() => {
                        window.pywebview.api.submit_flash_command(val);
                        input.value = '';
                    });
                }
            } else if (e.key === 'Escape') {
                triggerExit(() => {
                    window.pywebview.api.hide_flash();
                });
            }
        });

        // Focus input on show
        window.addEventListener('pywebviewready', () => {
            input.focus();
        });
    </script>
</body>
</html>
