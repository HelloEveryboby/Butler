<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Pet UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pet-container" id="pet-container">
        <!-- Glassmorphism Dialog Dialogue -->
        <div class="glass-dialog" id="pet-dialog">Butler 正在守护你</div>

        <!-- Butler Pixel Avatar (Pixel Dog) -->
        <div class="butler-pet-avatar state-idle" id="pet-avatar">
            <!-- Concentric Dual-Ring / Orbitals -->
            <svg class="pet-svg" viewBox="0 0 64 64">
                <!-- Dual concentric rings -->
                <circle class="ring ring-outer" cx="32" cy="32" r="26" fill="none" stroke="rgba(217, 119, 6, 0.4)" stroke-width="2" stroke-dasharray="4 2" />
                <circle class="ring ring-inner" cx="32" cy="32" r="18" fill="none" stroke="rgba(217, 119, 6, 0.6)" stroke-width="2" stroke-dasharray="2 1" />

                <!-- Central SVG Pixel Dog -->
                <!-- Floppy Ears -->
                <rect class="dog-ear ear-l" x="19" y="22" width="4" height="8" fill="#d97706" rx="1" />
                <rect class="dog-ear ear-r" x="41" y="22" width="4" height="8" fill="#d97706" rx="1" />

                <!-- Dog Head Face -->
                <rect class="dog-face" x="22" y="24" width="20" height="16" rx="2" fill="#f59e0b" stroke="#d97706" stroke-width="2" />
                <!-- Dog Face Patches for Pixel aesthetic -->
                <rect class="dog-patch" x="24" y="26" width="6" height="6" fill="#ffffff" opacity="0.8" />

                <!-- Dog Eyes -->
                <rect class="dog-eye eye-l" x="26" y="28" width="2" height="2" fill="#1e293b" />
                <rect class="dog-eye eye-r" x="36" y="28" width="2" height="2" fill="#1e293b" />

                <!-- Cute Blush -->
                <rect class="dog-blush blush-l" x="24" y="31" width="2" height="1" fill="#f43f5e" opacity="0.6" />
                <rect class="dog-blush blush-r" x="38" y="31" width="2" height="1" fill="#f43f5e" opacity="0.6" />

                <!-- Dog Snout & Nose -->
                <rect class="dog-snout" x="28" y="31" width="8" height="6" rx="1" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" />
                <rect class="dog-nose" x="31" y="31" width="2" height="2" fill="#1e293b" />

                <!-- Dog Mouth -->
                <path class="dog-mouth" d="M30 34.5c.5.5 1 .5 1.5 0s1-.5 1.5 0" fill="none" stroke="#d97706" stroke-width="1" stroke-linecap="round" />
                <!-- Dog Tongue (Wags on generating/success) -->
                <rect class="dog-tongue" x="31" y="35" width="2" height="3" rx="1" fill="#f43f5e" />

                <!-- Success tick and Error cross overlays -->
                <path class="status-icon success-tick" d="M28 32l3 3 5-5" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <path class="status-icon error-cross" d="M28 28l8 8M36 28l-8 8" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
            </svg>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
