# Butler 智能管家系统配置文件

api:
  # DeepSeek API 密钥
  deepseek_key: "${DEEPSEEK_API_KEY:-}"
  # 百度语音 API 配置
  baidu_app_id: "${BAIDU_APP_ID:-}"
  baidu_api_key: "${BAIDU_API_KEY:-}"
  baidu_secret_key: "${BAIDU_SECRET_KEY:-}"
  # Picovoice 访问密钥
  picovoice_access_key: "${PICOVOICE_ACCESS_KEY:-}"
  quota:
    consumed: 0.0002

voice:
  # 模式: online (百度), local (Faster-Whisper), offline
  mode: "online"
  local_stt_model: "base"

display:
  default_mode: "host"
  theme: "google"
  usb_screen:
    width: 40
    height: 8

performance:
  # 模式: NORMAL, ECO, HIGH_PERFORMANCE
  mode: "NORMAL"

interpreter:
  safety_mode: true
  max_iterations: 10

runner_server:
  host: "127.0.0.1"
  port: 8000
  token: "YOUR_RUNNER_SERVER_TOKEN_HERE"

# 自动资源下载与更新配置
# 系统会自动从以下地址下载缺失的静态资源（图标、音效等）
update_source:
  # 资源下载基准地址 (程序会自动拼接内部路径，如 assets/ 或 audio/)
  assets_base_url: "https://raw.githubusercontent.com/HelloEveryboby/Butler/main/"
  # GitHub API 地址，用于检查系统更新
  api_latest_release: "https://api.github.com/repos/HelloEveryboby/Butler/releases/latest"
  python_runtime_urls:
    Windows: "https://www.python.org/ftp/python/3.12.3/python-3.12.3-embed-amd64.zip"
    Linux: "https://github.com/indygreg/python-build-standalone/releases/download/20240415/cpython-3.12.3+20240415-x86_64-unknown-linux-gnu-install_only.tar.gz"
    Darwin: "https://github.com/indygreg/python-build-standalone/releases/download/20240415/cpython-3.12.3+20240415-x86_64-apple-darwin-install_only.tar.gz"
